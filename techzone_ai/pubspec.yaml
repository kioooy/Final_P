name: techzone_ai
description: TechZone AI - Technology Devices E-Commerce Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # ── State Management ──────────────────────────────────────────────
  provider: ^6.1.5

  # ── Routing ───────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Google Maps ───────────────────────────────────────────────────
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

  # ── AI ────────────────────────────────────────────────────────────
  google_generative_ai: ^0.4.6

  # ── Environment ───────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ── UI ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2

  # ── Utilities ─────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.8
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/